# ============================================================
# COSY V0.1 — Render Blueprint
# Déploiement multi-services sur Render
# ============================================================

services:
  # --- API Backend (Fastify) ---
  - type: web
    name: cosy-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: cosy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cosy-redis
          property: connectionString
      - key: JWT_PRIVATE_KEY
        generateValue: true
      - key: JWT_PUBLIC_KEY
        generateValue: true
      - key: MINIO_ENDPOINT
        value: cosy-minio.onrender.com
      - key: MINIO_ACCESS_KEY
        generateValue: true
      - key: MINIO_SECRET_KEY
        generateValue: true
    healthCheckPath: /health
    autoDeploy: true

  # --- Frontend SPA (Static) ---
  - type: static
    name: cosy-app
    buildCommand: echo "Static SPA - no build needed"
    publishDir: ./frontend
    envVars:
      - key: API_URL
        value: https://cosy-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Dashboard Admin (Static) ---
  - type: static
    name: cosy-dashboard
    buildCommand: echo "Static Dashboard - no build needed"
    publishDir: ./dashboard
    envVars:
      - key: API_URL
        value: https://cosy-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # --- Background Worker (Queue) ---
  - type: worker
    name: cosy-worker
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run worker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cosy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cosy-redis
          property: connectionString

  # --- Cron Job (Daily stats) ---
  - type: cron
    name: cosy-cron
    runtime: node
    schedule: "0 0 * * *"
    buildCommand: npm install
    startCommand: npm run cron
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cosy-db
          property: connectionString

databases:
  - name: cosy-db
    databaseName: cosy
    user: cosy_admin
    plan: free
    postgresMajorVersion: "15"
    ipAllowList: []

keyvalue:
  - name: cosy-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

envVarGroups:
  - name: cosy-shared
    envVars:
      - key: APP_NAME
        value: COSY
      - key: APP_VERSION
        value: "0.1"
      - key: CORS_ORIGIN
        value: "https://cosy-app.onrender.com,https://cosy-dashboard.onrender.com"
      - key: RATE_LIMIT_WINDOW
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "100"
      - key: OTP_EXPIRY
        value: "300"
      - key: JWT_EXPIRY
        value: "3600"
      - key: REFRESH_TOKEN_EXPIRY
        value: "604800"
